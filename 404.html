<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Ahmed Nasr</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Instrument Sans', sans-serif;
            background: #0a0a0b;
            color: #f0ede6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .code {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(5rem, 15vw, 10rem);
            color: #c8a862;
            line-height: 1;
            margin-bottom: 1rem;
        }
        .message {
            font-size: 1.15rem;
            color: #a8a29e;
            margin-bottom: 2rem;
            max-width: 400px;
        }
        a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 2rem;
            border-radius: 4px;
            background: #c8a862;
            color: #0a0a0b;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        a:hover {
            background: #d4b670;
            box-shadow: 0 0 30px rgba(200, 168, 98, 0.15);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="code">404</div>
    <p class="message">This page doesn't exist — but the rest of the site does.</p>
    <a href="/">Back to Home</a>
</body>
</html>
